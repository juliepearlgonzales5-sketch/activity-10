<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ozamis City — Pearl of the North</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --p1: #0d0018;
      --p2: #1a0033;
      --p3: #3b0068;
      --p4: #6a0dad;
      --p5: #9b30ff;
      --p6: #c77dff;
      --p7: #e0aaff;
      --gold: #f0c040;
      --white: #f9f5ff;
      --glass: rgba(155, 48, 255, 0.12);
      --glass-border: rgba(199, 125, 255, 0.25);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--p1);
      color: var(--white);
      overflow-x: hidden;
    }

    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      background: rgba(13,0,24,0.85);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--glass-border);
      padding: 0 1.5rem;
    }

    .nav-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      text-decoration: none;
    }

    .nav-brand img {
      width: 40px;
      height: 40px;
      object-fit: contain;
      filter: drop-shadow(0 0 8px var(--p5));
    }

    .nav-brand span {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      color: var(--p7);
      letter-spacing: 0.5px;
    }

    .nav-links {
      display: flex;
      gap: 0.25rem;
      list-style: none;
    }

    .nav-links a {
      display: block;
      padding: 0.5rem 1rem;
      color: var(--p7);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      border-radius: 8px;
      transition: background 0.2s, color 0.2s;
      letter-spacing: 0.3px;
    }

    .nav-links a:hover {
      background: var(--glass);
      color: #fff;
    }

    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      padding: 6px;
      border: none;
      background: transparent;
    }

    .hamburger span {
      display: block;
      width: 26px;
      height: 2px;
      background: var(--p6);
      border-radius: 2px;
      transition: all 0.3s;
    }

    .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    .mobile-menu {
      display: none;
      flex-direction: column;
      background: rgba(13,0,24,0.97);
      border-top: 1px solid var(--glass-border);
      padding: 1rem 1.5rem 1.5rem;
    }

    .mobile-menu.open { display: flex; }

    .mobile-menu a {
      color: var(--p7);
      text-decoration: none;
      font-size: 1rem;
      font-weight: 500;
      padding: 0.85rem 0;
      border-bottom: 1px solid rgba(199,125,255,0.1);
      transition: color 0.2s;
    }

    .mobile-menu a:hover { color: #fff; }

    @media (max-width: 768px) {
      .nav-links { display: none; }
      .hamburger { display: flex; }
    }

    #home {
      position: relative;
      height: 100vh;
      min-height: 600px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background-image: url('https://eazytraveler.net/wp-content/uploads/2018/06/ozamiz-heritage-tour.jpg');
      background-size: cover;
      background-position: center;
      filter: brightness(0.35) saturate(0.8);
    }

    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(160deg, rgba(58,0,104,0.6) 0%, rgba(13,0,24,0.7) 60%, rgba(13,0,24,0.95) 100%);
    }

    .hero-glow {
      position: absolute;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(106,13,173,0.35) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      padding: 2rem;
      animation: fadeUp 1s ease both;
    }

    .hero-badge {
      display: inline-block;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      color: var(--p6);
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 0.45rem 1.2rem;
      border-radius: 999px;
      margin-bottom: 1.5rem;
    }

    .hero-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.8rem, 8vw, 5.5rem);
      line-height: 1.05;
      color: #fff;
      text-shadow: 0 4px 40px rgba(155,48,255,0.5);
      margin-bottom: 1rem;
    }

    .hero-title em {
      font-style: italic;
      color: var(--p6);
    }

    .hero-sub {
      font-size: clamp(1rem, 2.5vw, 1.2rem);
      color: var(--p7);
      max-width: 520px;
      margin: 0 auto 2.5rem;
      line-height: 1.7;
      font-weight: 300;
    }

    .btn {
      display: inline-block;
      padding: 0.85rem 2rem;
      border-radius: 999px;
      font-size: 0.95rem;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.25s;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--p4), var(--p5));
      color: #fff;
      box-shadow: 0 8px 30px rgba(106,13,173,0.45);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(106,13,173,0.65);
    }

    .btn-ghost {
      border: 1px solid var(--glass-border);
      color: var(--p7);
      margin-left: 1rem;
      background: var(--glass);
    }

    .btn-ghost:hover {
      background: rgba(155,48,255,0.25);
      color: #fff;
    }

    .scroll-down {
      position: absolute;
      bottom: 2.5rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      animation: bounce 2s infinite;
    }

    .scroll-down span {
      display: block;
      width: 24px;
      height: 24px;
      border-right: 2px solid var(--p6);
      border-bottom: 2px solid var(--p6);
      transform: rotate(45deg);
      margin: -8px auto;
      opacity: 0.7;
    }

    section { padding: 6rem 1.5rem; }
    .container { max-width: 1200px; margin: 0 auto; }

    .section-label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--p5);
      margin-bottom: 0.75rem;
    }

    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 3rem);
      line-height: 1.15;
      color: #fff;
      margin-bottom: 1rem;
    }

    .section-desc {
      color: var(--p7);
      font-size: 1rem;
      line-height: 1.8;
      max-width: 600px;
      font-weight: 300;
    }

    .divider {
      width: 60px;
      height: 3px;
      background: linear-gradient(90deg, var(--p4), var(--p5));
      border-radius: 2px;
      margin: 1.25rem 0 2rem;
    }

    #about { background: linear-gradient(180deg, var(--p1) 0%, var(--p2) 100%); }

    .about-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4rem;
      align-items: center;
    }

    .about-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem;
      margin-top: 2.5rem;
    }

    .stat-card {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 1.5rem;
    }

    .stat-card .num {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      color: var(--p6);
      line-height: 1;
    }

    .stat-card .lbl {
      font-size: 0.8rem;
      color: var(--p7);
      margin-top: 0.4rem;
      font-weight: 400;
    }

    .about-img-wrap img {
      width: 100%;
      border-radius: 20px;
      object-fit: cover;
      height: 420px;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
    }

    .card-img {
      width: 100%;
      height: 210px;
      object-fit: cover;
    }

    footer {
      background: var(--p2);
      border-top: 1px solid var(--glass-border);
      padding: 2.5rem 1.5rem;
      text-align: center;
    }
  </style>
</head>

<body>

<!-- HERO -->
<section id="home">
  <div class="hero-bg"></div>
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <h1>Discover Ozamis City</h1>
  </div>
</section>

<!-- ATTRACTIONS -->
<section id="attractions">
  <div class="cards-grid">

    <!-- Cotta Shrine -->
    <div class="card">
      <img class="card-img" src="https://dynamic-media-cdn.tripadvisor.com/media/photo-o/0e/4a/da/da/birhen-sa-cotta.jpg?w=900&h=500&s=1">
    </div>

    <!-- Food Park -->
    <div class="card">
      <img class="card-img" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSaZA0-_QVLsYq1LLasHugLRRFHK4QXHSO90Q&s">
    </div>

    <!-- OSROX -->
    <div class="card">
      <img class="card-img" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTFEIhMMltzGFf9-v_i_legTtfiwY6e_vwMKA&sco">
    </div>

  </div>
</section>

<!-- CULTURE -->
<section id="culture">
  <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjMBX1v67GgXI6amwo9bYmD-IkHqyIK9nO1ms5YfWBesST4aDpFbDGZzISmrw66p5dZRHN2YozWe-stasQ-79qoiVG_hoy8Q6EgboCnrs4f_t3hWEeHsClWxqpN0K8IwsROrq8rBB8xjHi2WQr__LDF2E4QvwbFvtcaD2cTdxiCa3DOnC6AN6hIYvWx2g/s1600/1.jpg">
</section>

<!-- TRANSPORT -->
<section id="transportation">
  <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcThgs5l2w93MSCeZi0GL4enAfdQlLnlzUCjAw&s">
</section>

</body>
</html>
